        const status = document.getElementById('status');

        async function init() {
            try {
                // Tahap 1: Decode Base64 (Chunked untuk menghindari freeze)
                status.innerText = "Memproses paket data...";
                await new Promise(r => setTimeout(r, 100));
                
                const binaryString = atob(b64);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                
                // Proses pemindahan byte dalam chunk kecil
                for (let i = 0; i < len; i += 100000) {
                    const end = Math.min(i + 100000, len);
                    for (let j = i; j < end; j++) {
                        bytes[j] = binaryString.charCodeAt(j);
                    }
                    status.innerText = "Dekripsi: " + Math.round((i/len)*100) + "%";
                    await new Promise(r => setTimeout(r, 10)); // Memberi nafas pada UI thread
                }

                // Tahap 2: Decompress Gzip
                status.innerText = "Membuka modul aplikasi...";
                const ds = new DecompressionStream('gzip');
                const stream = new Response(bytes).body.pipeThrough(ds);
                const content = await new Response(stream).text();

                // Tahap 3: Render (Blob Navigation)
                status.innerText = "Meluncurkan aplikasi...";
                const blob = new Blob([content], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                
                window.location.replace(url);
            } catch (err) {
                console.error(err);
                status.innerText = "Gagal memuat sistem: " + err.message;
                status.style.color = "#ef4444";
            }
        }
        init();
    </script>
